name: Build and Upload Windows EXE

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v3
        with:
          dotnet-version: '8.0.x'

      - name: Restore (optional)
        run: dotnet restore ./sys.csproj

      - name: Publish single-file EXE (to known folder)
        # use pwsh so we can use './artifacts/publish' path consistently on Windows runner
        shell: pwsh
        run: |
          dotnet publish ./sys.csproj -c Release -r win-x64 --self-contained true /p:PublishSingleFile=true -o ./artifacts/publish

      - name: List publish folder (debug)
        shell: pwsh
        run: |
          Write-Host "Contents of artifacts/publish:"
          dir ./artifacts/publish | Out-String | Write-Host

      - name: Upload EXE artifact
        uses: actions/upload-artifact@v4
        with:
          name: TrentonMessage
          path: ./artifacts/publish/*.exe
