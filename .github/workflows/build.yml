name: Build Windows EXE

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v3
        with:
          dotnet-version: '8.0.x'

      - name: Build EXE
        run: dotnet publish sys.csproj -c Release -r win-x64 --self-contained true /p:PublishSingleFile=true /p:IncludeAllContentForSelfExtract=true

      - name: Upload EXE
        uses: actions/upload-artifact@v3
        with:
          name: TrentonMessage
          path: sys/bin/Release/net8.0-windows/win-x64/publish/sys.exe
